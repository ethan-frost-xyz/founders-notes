name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('ingestion/requirements.txt', 'ingestion/requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          pip install -r ingestion/requirements.txt -r ingestion/requirements-dev.txt

      - name: Run tests
        run: pytest tests -q --durations=10

      - name: Run verify.py
        working-directory: ingestion
        run: python pipeline/verify.py
