name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r ingestion/requirements.txt -r ingestion/requirements-dev.txt

      - name: Run tests
        run: pytest tests -q

      - name: Run verify.py
        working-directory: ingestion
        run: python pipeline/verify.py
