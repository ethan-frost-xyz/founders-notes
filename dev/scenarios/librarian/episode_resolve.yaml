name: Librarian episode resolve NL
llm: live
turns:
  - send: "What did I note on episode 191?"
    expect:
      response_min_length: 40
      not_contains_all:
        - "Episode not in catalog"
        - "Try naming an episode id like ep-"
      expect_live:
        tool_called: load_episode
        load_episode_id: ep-0191
        response_contains_any:
          - ep-0191
          - Naval
  - send: "Summarize what I captured on episode 22."
    expect:
      expect_live:
        tool_called: load_episode
        load_episode_id: ep-0022
  - send: "/clear"
    expect:
      contains: "Session cleared"
