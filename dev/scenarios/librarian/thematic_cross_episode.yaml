name: Librarian thematic cross-episode
llm: live
turns:
  - send: "What did I note about Rockefeller and competition across episodes?"
    expect:
      response_min_length: 40
      expect_live:
        tool_called_any:
          - search_vault
          - search_vault_many
        response_contains_any:
          - ep-
          - Rockefeller
  - send: "How do founders think about compounding and long-term reputation?"
    expect:
      response_min_length: 60
      expect_live:
        tool_called_any:
          - search_vault
          - search_vault_many
  - send: "What mental models show up around inversion and avoiding stupidity?"
    expect:
      response_min_length: 60
      expect_live:
        tool_called_any:
          - search_vault
          - search_vault_many
        response_contains_any:
          - Munger
          - invert
